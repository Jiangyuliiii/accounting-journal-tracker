name: Weekly Literature Update

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch journal papers
        run: python scripts/fetch_papers.py

      - name: Enrich abstracts
        run: python scripts/enrich_abstracts.py

      - name: Fetch working papers
        run: python scripts/fetch_working_papers.py

      - name: Fetch conferences and seminars
        run: python scripts/fetch_conferences.py

      - name: Build site
        run: python scripts/build_site.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/papers.json data/working_papers.json data/conferences.json site/index.html
          git commit -m "Weekly literature update" || echo "No changes to commit"
          git push